  // ── LO 1: Determining Coverage Amount ──

  { s: "LO1 — Coverage Approaches", q: "Human Life Value vs. Needs Approach", a: "HUMAN LIFE VALUE: focuses on INCOME REPLACEMENT only (earnings-based). NEEDS: focuses on SPECIFIC FINANCIAL GOALS (needs-based). Needs approach is more comprehensive." },

  { s: "LO1 — Coverage Approaches", q: "Interest-Only Method", a: "MAINTAINS the principal for future payments — only interest is used for income. The principal is never spent." },
  { s: "LO1 — Coverage Approaches", q: "Seat-of-the-Pants Method", a: "ARBITRARILY selects an amount of insurance without calculation. Not recommended — no analytical basis." },

  // ── LO 2: Personal Uses of Life Insurance ──
  { s: "LO2 — Personal Uses", q: "Life insurance as an asset", a: "Life insurance is both an ASSET and PROTECTION against loss. Creates an IMMEDIATE ESTATE at death. Policy is included in the owner's estate for tax purposes." },

  // ── LO 3: Business Continuation Planning ──
  { s: "LO3 — Business Uses", q: "Business uses of life insurance", a: "FUNDING for business continuation agreements. BUSINESS INTERRUPTION insurance. EMPLOYEE BENEFIT protecting families. Key person protection." },
  { s: "LO3 — Business Uses", q: "Buy-Sell Agreement", a: "LEGAL AGREEMENT providing for ORDERLY business continuation and payment to the deceased's survivors. Guarantees CASH AVAILABILITY to purchase the deceased owner's interest." },
  { s: "LO3 — Business Uses", q: "Buy-Sell for Sole Proprietors", a: "TWO-STEP PLAN: (1) employee takes over MANAGEMENT, (2) employee purchases the business. Funded with life insurance on the owner." },
  { s: "LO3 — Business Uses", q: "Buy-Sell for Partnerships", a: "Can use an ENTITY PLAN (partnership buys) or CROSS-PURCHASE PLAN (partners buy from each other). Funded with life insurance on each partner." },
  { s: "LO3 — Business Uses", q: "Buy-Sell for Corporations", a: "STOCK REDEMPTION PLAN (entity — corporation buys back shares) or CROSS-PURCHASE PLAN (stockholders buy from each other)." },

  // ── LO 4: Entity vs. Cross-Purchase Plans ──
  { s: "LO4 — Plan Types", q: "Entity Plan", a: "Agreement between the BUSINESS and each owner. BUSINESS is obligated to buy the deceased owner's interest. Business purchases, owns, and pays for policies on each owner. SIMPLER with many partners (fewer policies needed)." },

  { s: "LO5 — Key Employee", q: "Four purposes of key employee insurance", a: "(1) BUSINESS INDEMNIFICATION: compensates for financial loss. (2) RESERVE FUND: living benefit through cash value. (3) BUSINESS CREDIT: loan repayment guarantee. (4) FAVORABLE TAX: death proceeds tax-free." },

  { s: "LO6 — Employee Benefits", q: "Deferred Compensation", a: "NON-QUALIFIED retirement plan for HIGHLY PAID employees. Compensation is PAID LATER — at disability, retirement, or death. Funded by the employer." },
  { s: "LO6 — Employee Benefits", q: "Salary Continuation", a: "CORPORATE-SPONSORED benefit replacing EXECUTIVE INCOME. Funded entirely by the EMPLOYER, not the employee." },
  { s: "LO6 — Employee Benefits", q: "Executive Bonus Plan (Section 162)", a: "Employer pays a BONUS used by the employee to purchase INSURANCE PREMIUMS. TAX-DEDUCTIBLE to employer. TAXABLE to employee as income." },
  { s: "LO6 — Employee Benefits", q: "Split-Dollar Plan", a: "EMPLOYER-EMPLOYEE arrangement SPLITTING the death benefit and cash value. Combines the employee's NEED with the employer's ABILITY TO PAY." },
  { s: "LO6 — Employee Benefits", q: "Employee benefit plans — key distinctions", a: "DEFERRED COMP: paid later, non-qualified. SALARY CONTINUATION: employer-funded income replacement. EXECUTIVE BONUS (162): employer bonus for premiums, deductible to employer, taxable to employee. SPLIT-DOLLAR: split death benefit/cash value." },
];

let currentIdx = 0;
let flipped = false;
let shuffled = [...cards];

function renderCard() {
  const c = shuffled[currentIdx];
  document.getElementById('fc-front-text').textContent = c.q;
  document.getElementById('fc-back-text').textContent  = c.a;
  document.getElementById('fc-progress').textContent = `Card ${currentIdx + 1} of ${shuffled.length}`;
  const card = document.getElementById('fc-card');
  card.classList.remove('flipped');
  flipped = false;
}

function flipCard() {
  const card = document.getElementById('fc-card');
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function nextCard() {
  if (currentIdx < shuffled.length - 1) currentIdx++;
  else currentIdx = 0;
  renderCard();
}

function prevCard() {
  if (currentIdx > 0) currentIdx--;
  else currentIdx = shuffled.length - 1;
  renderCard();
}

function shuffleCards() {
  shuffled = [...cards].sort(() => Math.random() - 0.5);
  currentIdx = 0;
  renderCard();
}

renderCard();

  {
    section: "Employee Benefit Plans",
    q: "COLI premiums are generally:",
    opts: ["Tax-deductible with tax-free proceeds","Not tax-deductible but proceeds are tax-free","Tax-deductible with taxable proceeds","Not tax-deductible with taxable proceeds"],
    ans: 1,
    exp: "COLI premiums are generally not tax-deductible, but the proceeds are paid tax-free to the corporation."
  },
];

// ── Quiz Engine ──
let answered = {};
let submitted = false;
let score = 0;

function buildQuiz() {
  answered = {};
  submitted = false;
  score = 0;
  const area = document.getElementById('quiz-area');
  let html = `<div class="quiz-header"><div class="quiz-meta">${questions.length} Questions</div><div class="score-badge" id="score-live">0/${questions.length} answered</div></div>`;
  let lastSection = '';

  questions.forEach((q, i) => {
    if (q.section !== lastSection) {
      html += `<div class="section-divider">${q.section}</div>`;
      lastSection = q.section;
    }
    html += `<div class="q-card" id="qcard-${i}">
      <div class="q-num">Question ${i + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
    const letters = ['A','B','C','D'];
    q.opts.forEach((opt, j) => {
      html += `<div class="opt" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})">
        <span class="opt-letter">${letters[j]}</span><span>${opt}</span>
      </div>`;
    });
    html += `</div><div class="explanation" id="exp-${i}">${q.exp}</div></div>`;
  });

  html += `<div style="text-align:center; margin-top:32px;">
    <button class="btn btn-primary" onclick="submitQuiz()" id="submit-btn">Submit & Score</button>
  </div><div id="results-area"></div>`;
  area.innerHTML = html;
}

function selectAnswer(qIdx, optIdx) {
  if (submitted) return;
  answered[qIdx] = optIdx;
  questions[qIdx].opts.forEach((_, j) => {
    const el = document.getElementById(`opt-${qIdx}-${j}`);
    el.style.borderColor = j === optIdx ? '#3b82f6' : '';
    el.style.background  = j === optIdx ? '#1e3a5f' : '';
    el.style.color       = j === optIdx ? '#e2e8f0' : '';
  });
  updateLiveScore();
}

function updateLiveScore() {
  let correct = 0;
  Object.keys(answered).forEach(i => { if (answered[i] === questions[i].ans) correct++; });
  document.getElementById('score-live').textContent = `${correct}/${Object.keys(answered).length} answered`;
}

function submitQuiz() {
  submitted = true;
  score = 0;
  questions.forEach((q, i) => {
    q.opts.forEach((_, j) => {
      const el = document.getElementById(`opt-${i}-${j}`);
      el.classList.add('disabled');
      if (j === q.ans) {
        el.classList.add('correct');
      } else if (answered[i] === j) {
        el.classList.add('wrong');
      }
    });
    document.getElementById(`exp-${i}`).classList.add('show');
    if (answered[i] === q.ans) score++;
  });

  const pct = Math.round((score / questions.length) * 100);
  let msg, color;
  if (pct >= 90)      { msg = "Excellent! You're exam-ready on this chapter."; color = "#4ade80"; }
  else if (pct >= 70) { msg = "Above passing threshold. Review missed questions."; color = "#facc15"; }
  else                { msg = "Below passing threshold. Review and retry!"; color = "#f87171"; }

  document.getElementById('score-live').textContent = `Score: ${score}/${questions.length} (${pct}%)`;
  document.getElementById('submit-btn').outerHTML = `<button class="btn btn-ghost" onclick="buildQuiz()">Retake Quiz</button>`;
  document.getElementById('results-area').innerHTML = `
    <div class="quiz-results">
      <div class="score-big" style="color:${color}">${pct}%</div>
      <div class="score-sub">${score} correct out of ${questions.length}</div>
      <div class="score-msg" style="color:${color}">${msg}</div>
      <div style="margin-top:8px;font-size:0.85rem;color:#64748b;">Pass threshold: 70% · Scroll up to review explanations</div>
    </div>`;
  window.scrollTo({ top: document.getElementById('results-area').offsetTop - 80, behavior: 'smooth' });
}

function showTab(t) {
  document.getElementById('tab-flashcards').style.display = t === 'flashcards' ? '' : 'none';
  document.getElementById('tab-quiz').style.display       = t === 'quiz' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && t === 'flashcards') || (i === 1 && t === 'quiz'));
  });
  if (t === 'quiz' && !document.querySelector('.q-card')) buildQuiz();
}
</script>
