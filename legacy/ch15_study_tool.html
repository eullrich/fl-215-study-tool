<script>
const cards = [

  // ── LO 1: Basic vs. Major Medical ──
  { s: "LO1 — Basic vs. Major Medical", q: "Basic Medical Expense Insurance", a: "FIRST-DOLLAR coverage (NO deductibles). Modest coverage limits. Only covers SPECIFIC LISTED services. Three types: hospital, surgical, physician. Considered EXCEPTED BENEFITS (exempt from ACA)." },
  { s: "LO1 — Basic vs. Major Medical", q: "Major Medical Expense Insurance", a: "COMPREHENSIVE coverage for catastrophic expenses. Has DEDUCTIBLES and COINSURANCE. HIGH maximum benefits, fewer exclusions. Covers all MEDICALLY NECESSARY treatments unless excluded. Based on UCR standard." },
  { s: "LO1 — Basic vs. Major Medical", q: "UCR (Usual, Customary, and Reasonable)", a: "Standard used by major medical to determine benefit amounts. Based on GEOGRAPHIC NORMS for similar services. Charges exceeding UCR are the insured's responsibility." },
  { s: "LO1 — Basic vs. Major Medical", q: "Common Exclusions from All Medical Expense Policies", a: "Elective COSMETIC procedures. EXPERIMENTAL therapies. Care in GOVERNMENT facilities. WORK-RELATED injuries. OCCUPATIONAL diseases (covered by workers' comp)." },

  // ── LO 2: Basic Expense Coverage Types ──
  { s: "LO2 — Basic Coverage", q: "Basic Hospital Expense Insurance", a: "Covers hospital ROOM AND BOARD plus miscellaneous expenses (lab, X-ray, medicines, ICU, OR). Pays on an INDEMNITY basis (fixed dollar amount). Only covers charges billed by the HOSPITAL." },
  { s: "LO2 — Basic Coverage", q: "Basic Surgical Expense Insurance", a: "Pays for SURGEONS' services regardless of location. Includes surgeon's and anesthesiologist fees. Three benefit approaches: SURGICAL SCHEDULE, RELATIVE VALUE SCALE, and UCR." },
  { s: "LO2 — Basic Coverage", q: "Surgical Schedule Approach", a: "Assigns a FIXED DOLLAR AMOUNT to each procedure. Simple but may not reflect actual costs." },
  { s: "LO2 — Basic Coverage", q: "Relative Value Scale Approach", a: "Assigns UNITS to procedures with a DOLLAR VALUE PER UNIT. More flexible than a surgical schedule." },
  { s: "LO2 — Basic Coverage", q: "Basic Physician Expense Insurance", a: "Covers NON-SURGICAL physician services (outpatient). Pays a FIXED AMOUNT PER VISIT. Usually included with hospital/surgical plans — NOT written alone." },

  // ── LO 3: Deductibles ──
  { s: "LO3 — Deductibles", q: "Calendar-Year (Cumulative) Deductible", a: "Met ONCE during the benefit period. All covered expenses accumulate toward the single annual deductible. Also called ALL-CAUSE deductible." },
  { s: "LO3 — Deductibles", q: "Flat Deductible", a: "A STATED DOLLAR AMOUNT the insured must pay before insurance pays anything." },
  { s: "LO3 — Deductibles", q: "Corridor Deductible", a: "The GAP between BASIC COVERAGE and MAJOR MEDICAL coverage. The insured pays this gap out of pocket." },
  { s: "LO3 — Deductibles", q: "Integrated Deductible", a: "Amounts paid by a BASIC POLICY apply toward the MAJOR MEDICAL deductible. Reduces the out-of-pocket gap." },
  { s: "LO3 — Deductibles", q: "Per-Cause (Occurrence) Deductible", a: "SEPARATE deductible for EACH accident or illness. Must meet a new deductible for each different cause." },
  { s: "LO3 — Deductibles", q: "Family Maximum Deductible", a: "LIMITS the total deductible amount required from the entire covered family." },
  { s: "LO3 — Deductibles", q: "Carryover Provision", a: "Claims from the FINAL THREE MONTHS of the policy year can apply to NEXT YEAR'S deductible. Prevents penalizing late-year claims." },
  { s: "LO3 — Deductibles", q: "Corridor vs. Integrated Deductible", a: "CORRIDOR: gap between basic and major medical, insured pays it fully. INTEGRATED: basic plan payments credit toward major medical deductible, reducing the gap." },

  // ── LO 4: Coinsurance & Stop-Loss ──
  { s: "LO4 — Coinsurance & Stop-Loss", q: "Coinsurance", a: "PERCENTAGE participation in covered expenses AFTER the deductible. Expressed as insurer/insured ratio (e.g., 80/20). Insurer must pay at least 50% to qualify as insurance." },
  { s: "LO4 — Coinsurance & Stop-Loss", q: "Stop-Loss Provision (Out-of-Pocket Maximum)", a: "LIMITS the insured's out-of-pocket medical expenses. Includes deductible, coinsurance, and copays. Does NOT include premiums, UCR overages, or non-covered services. 2025: $9,200 individual / $18,400 family." },
  { s: "LO4 — Coinsurance & Stop-Loss", q: "Claim Calculation Steps", a: "(1) Determine TOTAL claim. (2) Subtract DEDUCTIBLE. (3) Apply COINSURANCE percentage. (4) Add deductible + coinsurance = insured's cost. (5) Apply STOP-LOSS if applicable." },
  { s: "LO4 — Coinsurance & Stop-Loss", q: "What does stop-loss NOT include?", a: "PREMIUMS paid. Charges EXCEEDING UCR. NON-COVERED services. These are always the insured's responsibility even after reaching the out-of-pocket maximum." },

  // ── LO 5: ACA Essential Health Benefits ──
  { s: "LO5 — ACA", q: "10 Essential Health Benefits (ACA)", a: "(1) Ambulatory/outpatient. (2) Emergency. (3) Hospitalization. (4) Maternity/newborn. (5) Prescription drugs. (6) Mental health/substance abuse. (7) Rehab/habilitative. (8) Lab services. (9) Preventive/wellness. (10) Pediatric (dental + vision)." },
  { s: "LO5 — ACA", q: "ACA Metal Tiers", a: "BRONZE: 60% actuarial value (60/40). SILVER: 70% (70/30). GOLD: 80% (80/20). PLATINUM: 90% (90/10). Higher tier = higher premium, lower out-of-pocket." },
  { s: "LO5 — ACA", q: "ACA Key Provisions", a: "PREVENTIVE services at 100% (no cost-sharing). DEPENDENT coverage through AGE 26. NO pre-existing condition exclusions. No LIFETIME or ANNUAL caps on essential benefits." },
  { s: "LO5 — ACA", q: "ACA Employer Mandate", a: "Employers with 50+ FULL-TIME EQUIVALENT employees must offer coverage or face SHARED RESPONSIBILITY PAYMENT." },
  { s: "LO5 — ACA", q: "Premium Tax Credits", a: "Available to eligible individuals/families purchasing through ACA EXCHANGES. Based on income level to make coverage affordable." },

  // ── LO 6: Tax-Advantaged Health Accounts ──
  { s: "LO6 — Health Accounts", q: "HSA (Health Savings Account)", a: "Requires qualifying HDHP. TAX-DEDUCTIBLE contributions; TAX-FREE qualified withdrawals. 2025 limits: $4,300 individual / $8,550 family. $1,000 CATCH-UP (ages 55-65). Funds ROLL OVER. PORTABLE (owned by individual). 20% penalty for non-qualified withdrawals." },
  { s: "LO6 — Health Accounts", q: "HRA (Health Reimbursement Arrangement)", a: "EMPLOYER-established and funded. NO limit on annual contributions. Tax-free reimbursements. NOT PORTABLE (funds stay with employer). Unused amounts CAN carry forward." },
  { s: "LO6 — Health Accounts", q: "FSA (Flexible Spending Account)", a: "Through employer's CAFETERIA PLAN. 2025 limit: $3,200. USE IT OR LOSE IT (limited $640 rollover). CANNOT have an HSA simultaneously. No HDHP required." },
  { s: "LO6 — Health Accounts", q: "Archer MSA", a: "For SMALL employers (50 or fewer) and self-employed. GRANDFATHERED — no new accounts since 2008. 20% penalty for non-qualified withdrawals. Unused balances roll over." },
  { s: "LO6 — Health Accounts", q: "HSA vs. HRA vs. FSA", a: "HSA: individual-owned, portable, HDHP required, rolls over. HRA: employer-owned, not portable, no limit, carries forward. FSA: use-it-or-lose-it, no HDHP needed, $3,200 limit." },

  // ── LO 7: HDHPs & CDHPs ──
  { s: "LO7 — HDHPs", q: "HDHP (High-Deductible Health Plan)", a: "Makes basic expenses (except PREVENTIVE CARE) the insured's responsibility. 2025 minimum deductibles: $1,650 individual / $3,300 family. 2025 max out-of-pocket: $8,300 individual / $16,600 family. REQUIRED for HSA eligibility." },
  { s: "LO7 — HDHPs", q: "CDHP (Consumer-Driven Health Plan)", a: "Three elements: TAX-ADVANTAGED SAVINGS vehicle + CORRIDOR/INTEGRATED DEDUCTIBLE + HDHP. Incentivizes COST-CONSCIOUS healthcare decisions. Major medical coverage caps risk." },

  // ── LO 8: HIPAA & Tax Treatment ──
  { s: "LO8 — HIPAA & Taxes", q: "HIPAA — Pre-Existing Conditions in Group Plans", a: "6-MONTH LOOK-BACK period to define pre-existing conditions. Exclusion limited to 12 MONTHS (18 for late enrollees). Applies to groups of 2+, NOT individual policies. No gap exceeding 62 DAYS to maintain portability." },
  { s: "LO8 — HIPAA & Taxes", q: "Tax Treatment of Medical Expense Insurance", a: "BENEFITS received are NOT TAXABLE. Employee premiums deductible if itemized and exceed 7.5% OF AGI. Self-employed can deduct 100% of premiums. Partnership/LLC premiums are TAX-DEDUCTIBLE to the business." },
];

let currentIdx = 0;
let flipped = false;
let shuffled = [...cards];

function renderCard() {
  const c = shuffled[currentIdx];
  document.getElementById('fc-front-text').textContent = c.q;
  document.getElementById('fc-back-text').textContent  = c.a;
  document.getElementById('fc-progress').textContent = `Card ${currentIdx + 1} of ${shuffled.length}`;
  const card = document.getElementById('fc-card');
  card.classList.remove('flipped');
  flipped = false;
}

function flipCard() {
  const card = document.getElementById('fc-card');
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function nextCard() {
  if (currentIdx < shuffled.length - 1) currentIdx++;
  else currentIdx = 0;
  renderCard();
}

function prevCard() {
  if (currentIdx > 0) currentIdx--;
  else currentIdx = shuffled.length - 1;
  renderCard();
}

function shuffleCards() {
  shuffled = [...cards].sort(() => Math.random() - 0.5);
  currentIdx = 0;
  renderCard();
}

renderCard();

// ── Quiz Engine ──
let answered = {};
let submitted = false;
let score = 0;

function buildQuiz() {
  answered = {};
  submitted = false;
  score = 0;
  const area = document.getElementById('quiz-area');
  let html = `<div class="quiz-header"><div class="quiz-meta">${questions.length} Questions</div><div class="score-badge" id="score-live">0/${questions.length} answered</div></div>`;
  let lastSection = '';

  questions.forEach((q, i) => {
    if (q.section !== lastSection) {
      html += `<div class="section-divider">${q.section}</div>`;
      lastSection = q.section;
    }
    html += `<div class="q-card" id="qcard-${i}">
      <div class="q-num">Question ${i + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
    const letters = ['A','B','C','D'];
    q.opts.forEach((opt, j) => {
      html += `<div class="opt" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})">
        <span class="opt-letter">${letters[j]}</span><span>${opt}</span>
      </div>`;
    });
    html += `</div><div class="explanation" id="exp-${i}">${q.exp}</div></div>`;
  });

  html += `<div style="text-align:center; margin-top:32px;">
    <button class="btn btn-primary" onclick="submitQuiz()" id="submit-btn">Submit & Score</button>
  </div><div id="results-area"></div>`;
  area.innerHTML = html;
}

function selectAnswer(qIdx, optIdx) {
  if (submitted) return;
  answered[qIdx] = optIdx;
  questions[qIdx].opts.forEach((_, j) => {
    const el = document.getElementById(`opt-${qIdx}-${j}`);
    el.style.borderColor = j === optIdx ? '#3b82f6' : '';
    el.style.background  = j === optIdx ? '#1e3a5f' : '';
    el.style.color       = j === optIdx ? '#e2e8f0' : '';
  });
  updateLiveScore();
}

function updateLiveScore() {
  let correct = 0;
  Object.keys(answered).forEach(i => { if (answered[i] === questions[i].ans) correct++; });
  document.getElementById('score-live').textContent = `${correct}/${Object.keys(answered).length} answered`;
}

function submitQuiz() {
  submitted = true;
  score = 0;
  questions.forEach((q, i) => {
    q.opts.forEach((_, j) => {
      const el = document.getElementById(`opt-${i}-${j}`);
      el.classList.add('disabled');
      if (j === q.ans) {
        el.classList.add('correct');
      } else if (answered[i] === j) {
        el.classList.add('wrong');
      }
    });
    document.getElementById(`exp-${i}`).classList.add('show');
    if (answered[i] === q.ans) score++;
  });

  const pct = Math.round((score / questions.length) * 100);
  let msg, color;
  if (pct >= 90)      { msg = "Excellent! You're exam-ready on this chapter."; color = "#4ade80"; }
  else if (pct >= 70) { msg = "Above passing threshold. Review missed questions."; color = "#facc15"; }
  else                { msg = "Below passing threshold. Review and retry!"; color = "#f87171"; }

  document.getElementById('score-live').textContent = `Score: ${score}/${questions.length} (${pct}%)`;
  document.getElementById('submit-btn').outerHTML = `<button class="btn btn-ghost" onclick="buildQuiz()">Retake Quiz</button>`;
  document.getElementById('results-area').innerHTML = `
    <div class="quiz-results">
      <div class="score-big" style="color:${color}">${pct}%</div>
      <div class="score-sub">${score} correct out of ${questions.length}</div>
      <div class="score-msg" style="color:${color}">${msg}</div>
      <div style="margin-top:8px;font-size:0.85rem;color:#64748b;">Pass threshold: 70% · Scroll up to review explanations</div>
    </div>`;
  window.scrollTo({ top: document.getElementById('results-area').offsetTop - 80, behavior: 'smooth' });
}

function showTab(t) {
  document.getElementById('tab-flashcards').style.display = t === 'flashcards' ? '' : 'none';
  document.getElementById('tab-quiz').style.display       = t === 'quiz' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && t === 'flashcards') || (i === 1 && t === 'quiz'));
  });
  if (t === 'quiz' && !document.querySelector('.q-card')) buildQuiz();
}
