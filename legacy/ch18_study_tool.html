  .btn-primary:hover { background: #1d4ed8; }
  .btn-ghost { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  .btn-ghost:hover { background: #334155; color: #e2e8f0; }
  .btn-sm { padding: 7px 16px; font-size: 0.8rem; }
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .quiz-meta { font-size: 0.8rem; color: #64748b; }
  .score-badge { background: #1e293b; border: 1px solid #334155; border-radius: 999px; padding: 4px 14px; font-size: 0.8rem; font-weight: 700; color: #94a3b8; }
  .q-card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 28px; margin-bottom: 20px; }
  .q-num { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; margin-bottom: 10px; }

  .opt { padding: 12px 18px; border-radius: 9px; border: 1.5px solid #334155; background: #0f172a; cursor: pointer; font-size: 0.9rem; color: #cbd5e1; transition: all 0.15s; display: flex; align-items: flex-start; gap: 10px; }

  .opt.wrong   { border-color: #ef4444; background: #7f1d1d22; color: #f87171; }

  .opt-letter { font-weight: 700; opacity: 0.5; min-width: 18px; }

let currentIdx = 0;
let flipped = false;
let shuffled = [...cards];

function renderCard() {
  const c = shuffled[currentIdx];
  document.getElementById('fc-front-text').textContent = c.q;
  document.getElementById('fc-back-text').textContent  = c.a;
  document.getElementById('fc-progress').textContent = `Card ${currentIdx + 1} of ${shuffled.length}`;
  document.getElementById('fc-card').classList.remove('flipped');
  flipped = false;
}
function flipCard() { flipped = !flipped; document.getElementById('fc-card').classList.toggle('flipped', flipped); }
function nextCard() { currentIdx = currentIdx < shuffled.length - 1 ? currentIdx + 1 : 0; renderCard(); }
function prevCard() { currentIdx = currentIdx > 0 ? currentIdx - 1 : shuffled.length - 1; renderCard(); }
function shuffleCards() { shuffled = [...cards].sort(() => Math.random() - 0.5); currentIdx = 0; renderCard(); }
renderCard();

const questions = [
  { section: "Mandatory Provisions", q: "Mandatory health insurance provisions generally benefit:", opts: ["The insurer","The insured","The agent","The state"], ans: 1, exp: "Mandatory provisions generally benefit the insured — they establish minimum protections." },

  { section: "Mandatory Provisions", q: "No legal action can be taken until _____ days after proof of loss.", opts: ["30","60","90","120"], ans: 1, exp: "No legal action until 60 days after proof of loss, and must commence within 3 years." },
  { section: "Mandatory Provisions", q: "Upon reinstatement, the probationary period for sickness coverage is:", opts: ["5 days","10 days","15 days","30 days"], ans: 1, exp: "Reinstatement includes a 10-day probationary period for sickness. Accidents are covered immediately." },

  { section: "Optional Provisions", q: "Optional health insurance provisions generally benefit:", opts: ["The insured","The insurer","Both equally","The state"], ans: 1, exp: "Optional provisions generally benefit the insurer — they protect against fraud, overinsurance, and moral hazard." },

let answered = {};
let submitted = false;
let score = 0;

function buildQuiz() {
  answered = {}; submitted = false; score = 0;
  const area = document.getElementById('quiz-area');
  let html = `<div class="quiz-header"><div class="quiz-meta">${questions.length} Questions</div><div class="score-badge" id="score-live">0/${questions.length} answered</div></div>`;
  let lastSection = '';
  questions.forEach((q, i) => {
    if (q.section !== lastSection) { html += `<div class="section-divider">${q.section}</div>`; lastSection = q.section; }
    html += `<div class="q-card" id="qcard-${i}"><div class="q-num">Question ${i + 1}</div><div class="q-text">${q.q}</div><div class="options">`;
    ['A','B','C','D'].forEach((l, j) => { html += `<div class="opt" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})"><span class="opt-letter">${l}</span><span>${q.opts[j]}</span></div>`; });
    html += `</div><div class="explanation" id="exp-${i}">${q.exp}</div></div>`;
  });
  html += `<div style="text-align:center; margin-top:32px;"><button class="btn btn-primary" onclick="submitQuiz()" id="submit-btn">Submit & Score</button></div><div id="results-area"></div>`;
  area.innerHTML = html;
}

function selectAnswer(qIdx, optIdx) {
  if (submitted) return;
  answered[qIdx] = optIdx;
  questions[qIdx].opts.forEach((_, j) => { const el = document.getElementById(`opt-${qIdx}-${j}`); el.style.borderColor = j === optIdx ? '#3b82f6' : ''; el.style.background = j === optIdx ? '#1e3a5f' : ''; el.style.color = j === optIdx ? '#e2e8f0' : ''; });
  updateLiveScore();
}

function updateLiveScore() {
  let correct = 0;
  Object.keys(answered).forEach(i => { if (answered[i] === questions[i].ans) correct++; });
  document.getElementById('score-live').textContent = `${correct}/${Object.keys(answered).length} answered`;
}

function submitQuiz() {
  submitted = true; score = 0;
  questions.forEach((q, i) => {
    q.opts.forEach((_, j) => { const el = document.getElementById(`opt-${i}-${j}`); el.classList.add('disabled'); if (j === q.ans) el.classList.add('correct'); else if (answered[i] === j) el.classList.add('wrong'); });
    document.getElementById(`exp-${i}`).classList.add('show');
    if (answered[i] === q.ans) score++;
  });
  const pct = Math.round((score / questions.length) * 100);
  let msg, color;
  if (pct >= 90) { msg = "Excellent! You're exam-ready on this chapter."; color = "#4ade80"; }
  else if (pct >= 70) { msg = "Above passing threshold. Review missed questions."; color = "#facc15"; }
  else { msg = "Below passing threshold. Review and retry!"; color = "#f87171"; }
  document.getElementById('score-live').textContent = `Score: ${score}/${questions.length} (${pct}%)`;
  document.getElementById('submit-btn').outerHTML = `<button class="btn btn-ghost" onclick="buildQuiz()">Retake Quiz</button>`;
  document.getElementById('results-area').innerHTML = `<div class="quiz-results"><div class="score-big" style="color:${color}">${pct}%</div><div class="score-sub">${score} correct out of ${questions.length}</div><div class="score-msg" style="color:${color}">${msg}</div><div style="margin-top:8px;font-size:0.85rem;color:#64748b;">Pass threshold: 70%</div></div>`;
  window.scrollTo({ top: document.getElementById('results-area').offsetTop - 80, behavior: 'smooth' });
}

function showTab(t) {
  document.getElementById('tab-flashcards').style.display = t === 'flashcards' ? '' : 'none';
  document.getElementById('tab-quiz').style.display = t === 'quiz' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => { el.classList.toggle('active', (i === 0 && t === 'flashcards') || (i === 1 && t === 'quiz')); });
  if (t === 'quiz' && !document.querySelector('.q-card')) buildQuiz();
}
</script>
