const cards = [

  // ── LO 1: What Is an Annuity ──
  { s: "LO1 — Annuity Basics", q: "Annuity", a: "A financial product designed to provide a STEADY INCOME STREAM. Only LIFE INSURANCE COMPANIES can offer annuities. Primary purpose: protect against OUTLIVING ASSETS." },
  { s: "LO1 — Annuity Basics", q: "Annuity vs. Life Insurance", a: "LIFE INSURANCE: creates an estate (protects against dying too soon). ANNUITY: systematically LIQUIDATES an estate (protects against living too long)." },
  { s: "LO1 — Annuity Basics", q: "Accumulation Phase", a: "The period when PREMIUMS ARE PAID and funds grow TAX-DEFERRED. Also called the pay-in phase." },
  { s: "LO1 — Annuity Basics", q: "Annuitization", a: "Converting accumulated funds into a GUARANTEED INCOME STREAM. This is IRREVERSIBLE — once annuitized, you cannot get the lump sum back." },
  { s: "LO1 — Annuity Basics", q: "Risk Sharing Contract", a: "PREMATURE DEATH benefits the insurer (fewer payments made). LONGEVITY benefits the annuitant (more payments received). Risk is shared between both parties." },

  // ── LO 2: Premium Payment Types ──

  { s: "LO2 — Premium Types", q: "Flexible Premium Annuity", a: "VARIABLE payment amounts determined by the OWNER. Most popular type: Flexible Premium Deferred Annuity (FPDA)." },
  { s: "LO2 — Premium Types", q: "Can periodic premium annuities provide immediate income?", a: "NO. Periodic premium annuities CANNOT provide immediate income — they must complete the pay-in phase first. Only SINGLE PREMIUM annuities can be immediate." },

  // ── LO 3: Immediate vs. Deferred ──
  { s: "LO3 — Immediate vs. Deferred", q: "Immediate Annuity", a: "Benefits begin within 30 DAYS to 12 MONTHS of purchase. Must be funded with SINGLE PREMIUM ONLY. NO accumulation period. Payments include both PRINCIPAL and INTEREST." },
  { s: "LO3 — Immediate vs. Deferred", q: "Deferred Annuity", a: "Benefits begin MORE THAN ONE YEAR in the future. Can be funded with ANY premium payment plan. Includes an ACCUMULATION PERIOD. Emphasizes SAFETY OF PRINCIPAL and TAX-DEFERRED growth." },
  { s: "LO3 — Immediate vs. Deferred", q: "Deferred annuity distribution options", a: "(1) LUMP-SUM distribution. (2) SYSTEMATIC WITHDRAWALS. (3) ANNUITIZATION (convert to income stream)." },
  { s: "LO3 — Immediate vs. Deferred", q: "Who should buy an immediate annuity?", a: "Those needing IMMEDIATE INCOME — typically RETIREES or DISABLED individuals who want guaranteed payments right away." },

  // ── LO 4: Fixed, Variable & Indexed ──

  { s: "LO4 — Annuity Types", q: "Variable Annuity", a: "Payments FLUCTUATE based on INVESTMENT PERFORMANCE. CONTRACT OWNER assumes investment risk. Includes a SEPARATE ACCOUNT for investments. Requires SECURITIES LICENSE (Series 6 or 7) to sell." },
  { s: "LO4 — Annuity Types", q: "Variable Annuity — Units", a: "ACCUMULATION UNITS: used during the pay-in phase (like shares being purchased). ANNUITY UNITS: used during the payout phase (determine payment amounts). Better INFLATION PROTECTION potential." },
  { s: "LO4 — Annuity Types", q: "Equity-Indexed Annuity", a: "A FIXED annuity with interest linked to a MARKET INDEX (e.g., S&P 500). PRINCIPAL GUARANTEED with minimum return. Participate in market GAINS without risk of market DECLINE." },
  { s: "LO4 — Annuity Types", q: "Participation Rate", a: "Limits the PERCENTAGE of index gains credited to an equity-indexed annuity. Example: 80% participation rate means you receive 80% of the index's gain." },
  { s: "LO4 — Annuity Types", q: "Fixed vs. Variable — Who bears risk?", a: "FIXED: INSURER bears investment risk, guarantees returns. VARIABLE: OWNER bears investment risk, returns fluctuate. Fixed = general account. Variable = separate account." },
  { s: "LO4 — Annuity Types", q: "Who can sell variable annuities?", a: "Requires a SECURITIES LICENSE (Series 6 or 7) in addition to an insurance license. Because the separate account is considered a security." },

  // ── LO 5: Settlement Options ──
  { s: "LO5 — Settlement Options", q: "Straight Life Annuity (Pure Life)", a: "Payments for the ANNUITANT'S LIFETIME ONLY. NO refund or survivorship benefits. HIGHEST monthly payment amount. Payments CEASE upon death." },
  { s: "LO5 — Settlement Options", q: "Annuity (Period) Certain", a: "Payments for a SPECIFIED PERIOD ONLY. If annuitant dies before period ends, beneficiary receives remaining payments. Payments STOP after the period even if annuitant is still alive." },
  { s: "LO5 — Settlement Options", q: "Life Annuity with Period Certain", a: "Guaranteed payments for LIFE or a SPECIFIED PERIOD, whichever is LONGER. Beneficiary gets remaining payments if annuitant dies during the period. No payments to beneficiary if annuitant outlives the period." },
  { s: "LO5 — Settlement Options", q: "Life with Installment Refund", a: "Guarantees RETURN OF PRINCIPAL. Continues the SAME MONTHLY PAYMENTS to the beneficiary until total principal is repaid." },
  { s: "LO5 — Settlement Options", q: "Life with Cash Refund", a: "Guarantees RETURN OF PRINCIPAL. Pays the REMAINING PRINCIPAL in a LUMP SUM to the beneficiary." },
  { s: "LO5 — Settlement Options", q: "Installment Refund vs. Cash Refund", a: "Both guarantee return of principal. INSTALLMENT: continues same monthly payments to beneficiary. CASH: pays remaining balance as a lump sum. Both are subtypes of life with refund option." },
  { s: "LO5 — Settlement Options", q: "Which settlement option has the highest payment?", a: "STRAIGHT LIFE (pure life) has the HIGHEST monthly payment because there is NO refund or survivor benefit — all risk of early death is on the annuitant." },

  // ── LO 6: Parties to an Annuity ──
  { s: "LO6 — Parties", q: "Annuity Contract Owner", a: "The person who PURCHASES the annuity and controls CONTRACT RIGHTS (withdrawals, beneficiary changes, etc.)." },
  { s: "LO6 — Parties", q: "Annuitant", a: "The person whose LIFE EXPECTANCY determines benefit payments. Only the ANNUITANT'S AGE is considered for payment calculations." },
  { s: "LO6 — Parties", q: "Owner vs. Annuitant", a: "Can be the SAME or DIFFERENT people. The OWNER controls the contract. The ANNUITANT'S life determines payments. If no beneficiary named, proceeds go to the OWNER'S ESTATE." },

  // ── LO 7: Surrender Charges ──

  { s: "LO7 — Surrender Charges", q: "Surrender charges vs. tax penalty", a: "SURRENDER CHARGE: charged by the insurer, decreases over time. TAX PENALTY: 10% FEDERAL penalty for withdrawals before age 59 1/2. These are SEPARATE — both may apply." },
  { s: "LO7 — Surrender Charges", q: "Surrender charge waivers", a: "May be waived for DEATH, DISABILITY, or EXTENDED MEDICAL CARE." },

  { s: "LO8 — Taxation", q: "Exclusion Ratio", a: "Determines the TAX-FREE portion of annuity payments. Formula: INVESTMENT IN CONTRACT / EXPECTED RETURN. The excluded portion represents return of principal (not taxable)." },
  { s: "LO8 — Taxation", q: "Early Withdrawal Penalty", a: "Withdrawals before age 59 1/2 are subject to 10% PENALTY plus ORDINARY INCOME TAX. Exceptions: disability, death, age 59 1/2+, immediate annuity, qualified pension plan." },
  { s: "LO8 — Taxation", q: "LIFO Taxation", a: "Post-1982 annuity withdrawals are taxed on a LIFO (Last In, First Out) basis — EARNINGS come out first and are taxable. Principal comes out last." },
  { s: "LO8 — Taxation", q: "1035 Exchange for Annuities", a: "TAX-FREE exchange of an annuity for ANOTHER ANNUITY. Life insurance CAN be exchanged for an annuity tax-free. An annuity CANNOT be exchanged for life insurance tax-free." },
  { s: "LO8 — Taxation", q: "Annuity tax summary", a: "Accumulation: TAX-DEFERRED. Withdrawals: LIFO (earnings first, taxable). Before 59 1/2: 10% penalty. Exclusion ratio: determines tax-free portion of payments. 1035: annuity-to-annuity or life-to-annuity only." },

  // ── LO 9: Applications of Annuities ──
  { s: "LO9 — Applications", q: "Individual uses for annuities", a: "RETIREMENT INCOME planning. TAX-DEFERRED growth. Funding IRAs and qualified plans. EDUCATION funding. STRUCTURED SETTLEMENTS for legal awards. LOTTERY WINNINGS distribution." },
  { s: "LO9 — Applications", q: "Business uses for annuities", a: "EXECUTIVE COMPENSATION. Business SUCCESSION PLANNING. KEY PERSON protection. Corporate PENSION PLANS. Funding future obligations. Employee RETENTION." },

  // ── LO 10: Suitability ──
  { s: "LO10 — Suitability", q: "Annuity suitability factors", a: "AGE of applicant/spouse. Annual INCOME. Financial SITUATION and needs. Financial EXPERIENCE. Financial OBJECTIVES. INTENDED USE. TIME HORIZON. Existing ASSETS. LIQUIDITY needs. RISK TOLERANCE." },
  { s: "LO10 — Suitability", q: "Senior consumer suitability", a: "Consumers age 65+ require an ADDITIONAL SUITABILITY ASSESSMENT. Producers must have REASONABLE GROUNDS for recommendations. State regulations establish special standards." },
  { s: "LO10 — Suitability", q: "FPDA — Most Popular Annuity", a: "FLEXIBLE PREMIUM DEFERRED ANNUITY is the MOST POPULAR annuity product. Flexible payments + deferred income = maximum flexibility for accumulation." },
];

let currentIdx = 0;
let flipped = false;
let shuffled = [...cards];

function renderCard() {
  const c = shuffled[currentIdx];
  document.getElementById('fc-front-text').textContent = c.q;
  document.getElementById('fc-back-text').textContent  = c.a;
  document.getElementById('fc-progress').textContent = `Card ${currentIdx + 1} of ${shuffled.length}`;
  const card = document.getElementById('fc-card');
  card.classList.remove('flipped');
  flipped = false;
}

function flipCard() {
  const card = document.getElementById('fc-card');
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function nextCard() {
  if (currentIdx < shuffled.length - 1) currentIdx++;
  else currentIdx = 0;
  renderCard();
}

function prevCard() {
  if (currentIdx > 0) currentIdx--;
  else currentIdx = shuffled.length - 1;
  renderCard();
}

function shuffleCards() {
  shuffled = [...cards].sort(() => Math.random() - 0.5);
  currentIdx = 0;
  renderCard();
}

renderCard();

// ── Quiz Engine ──
let answered = {};
let submitted = false;
let score = 0;

function buildQuiz() {
  answered = {};
  submitted = false;
  score = 0;
  const area = document.getElementById('quiz-area');
  let html = `<div class="quiz-header"><div class="quiz-meta">${questions.length} Questions</div><div class="score-badge" id="score-live">0/${questions.length} answered</div></div>`;
  let lastSection = '';

  questions.forEach((q, i) => {
    if (q.section !== lastSection) {
      html += `<div class="section-divider">${q.section}</div>`;
      lastSection = q.section;
    }
    html += `<div class="q-card" id="qcard-${i}">
      <div class="q-num">Question ${i + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">`;
    const letters = ['A','B','C','D'];
    q.opts.forEach((opt, j) => {
      html += `<div class="opt" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})">
        <span class="opt-letter">${letters[j]}</span><span>${opt}</span>
      </div>`;
    });
    html += `</div><div class="explanation" id="exp-${i}">${q.exp}</div></div>`;
  });

  html += `<div style="text-align:center; margin-top:32px;">
    <button class="btn btn-primary" onclick="submitQuiz()" id="submit-btn">Submit & Score</button>
  </div><div id="results-area"></div>`;
  area.innerHTML = html;
}

function selectAnswer(qIdx, optIdx) {
  if (submitted) return;
  answered[qIdx] = optIdx;
  questions[qIdx].opts.forEach((_, j) => {
    const el = document.getElementById(`opt-${qIdx}-${j}`);
    el.style.borderColor = j === optIdx ? '#3b82f6' : '';
    el.style.background  = j === optIdx ? '#1e3a5f' : '';
    el.style.color       = j === optIdx ? '#e2e8f0' : '';
  });
  updateLiveScore();
}

function updateLiveScore() {
  let correct = 0;
  Object.keys(answered).forEach(i => { if (answered[i] === questions[i].ans) correct++; });
  document.getElementById('score-live').textContent = `${correct}/${Object.keys(answered).length} answered`;
}

function submitQuiz() {
  submitted = true;
  score = 0;
  questions.forEach((q, i) => {
    q.opts.forEach((_, j) => {
      const el = document.getElementById(`opt-${i}-${j}`);
      el.classList.add('disabled');
      if (j === q.ans) {
        el.classList.add('correct');
      } else if (answered[i] === j) {
        el.classList.add('wrong');
      }
    });
    document.getElementById(`exp-${i}`).classList.add('show');
    if (answered[i] === q.ans) score++;
  });

  const pct = Math.round((score / questions.length) * 100);
  let msg, color;
  if (pct >= 90)      { msg = "Excellent! You're exam-ready on this chapter."; color = "#4ade80"; }
  else if (pct >= 70) { msg = "Above passing threshold. Review missed questions."; color = "#facc15"; }
  else                { msg = "Below passing threshold. Review and retry!"; color = "#f87171"; }

  document.getElementById('score-live').textContent = `Score: ${score}/${questions.length} (${pct}%)`;
  document.getElementById('submit-btn').outerHTML = `<button class="btn btn-ghost" onclick="buildQuiz()">Retake Quiz</button>`;
  document.getElementById('results-area').innerHTML = `
    <div class="quiz-results">
      <div class="score-big" style="color:${color}">${pct}%</div>
      <div class="score-sub">${score} correct out of ${questions.length}</div>
      <div class="score-msg" style="color:${color}">${msg}</div>
      <div style="margin-top:8px;font-size:0.85rem;color:#64748b;">Pass threshold: 70% · Scroll up to review explanations</div>
    </div>`;
  window.scrollTo({ top: document.getElementById('results-area').offsetTop - 80, behavior: 'smooth' });
}

function showTab(t) {
  document.getElementById('tab-flashcards').style.display = t === 'flashcards' ? '' : 'none';
  document.getElementById('tab-quiz').style.display       = t === 'quiz' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && t === 'flashcards') || (i === 1 && t === 'quiz'));
  });
  if (t === 'quiz' && !document.querySelector('.q-card')) buildQuiz();
}
