services:
  - type: web
    name: fl-215-study-tool
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: study-data
      mountPath: /opt/render/project/src/db_data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATA_DIR
        value: /opt/render/project/src/db_data
